<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SomuPilot AI - Personal AI Agent Dashboard"
    />
    <title>SomuPilot AI</title>
    <style>
      :root {
        color-scheme: dark;
        --boot-bg: #000000;
        --boot-surface: #0d0d0d;
        --boot-border: rgba(255, 255, 255, 0.08);
        --boot-track: rgba(255, 255, 255, 0.06);
        --boot-gradient: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.03) 42%,
          rgba(255, 255, 255, 0.08) 50%,
          rgba(255, 255, 255, 0.03) 58%,
          transparent 100%
        );
      }

      body {
        margin: 0;
        background: var(--boot-bg);
        overflow-x: hidden;
      }

      html, body, #root {
        min-height: 100%;
      }

      .boot-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.08), transparent 24%),
          #000000;
      }

      .boot-topbar {
        border-bottom: 1px solid var(--boot-border);
      }

      .boot-topbar-inner {
        width: min(100%, 1280px);
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 24px;
        box-sizing: border-box;
      }

      .boot-main {
        width: min(100%, 1280px);
        margin: 0 auto;
        padding: 0 16px;
        box-sizing: border-box;
      }

      .boot-card {
        border: 1px solid var(--boot-border);
        border-radius: 28px;
        background: var(--boot-surface);
      }

      .boot-hidden {
        display: none !important;
      }

      .boot-hero {
        min-height: calc(100vh - 81px);
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) 420px;
        align-items: center;
        gap: 40px;
        padding: 48px 0 64px;
      }

      .boot-shimmer {
        position: relative;
        overflow: hidden;
        background-color: var(--boot-track);
      }

      .boot-shimmer::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: var(--boot-gradient);
        background-size: 220% 100%;
        animation: boot-shimmer 2.2s linear infinite;
      }

      .boot-auth-stage {
        min-height: calc(100vh - 81px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 0;
      }

      .boot-auth-inner {
        width: 100%;
        max-width: 1024px;
        margin: 0 auto;
      }

      .boot-auth-grid {
        display: grid;
        gap: 40px;
        grid-template-columns: minmax(0, 1.2fr) 420px;
        align-items: center;
      }

      .boot-auth-card {
        position: relative;
        overflow: hidden;
        border-radius: 32px;
        padding: 32px;
      }

      @keyframes boot-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -120% 0; }
      }

      @media (max-width: 900px) {
        .boot-hero {
          grid-template-columns: 1fr;
          padding-top: 34px;
          gap: 26px;
        }

        .boot-auth-grid {
          grid-template-columns: 1fr;
        }

        .boot-auth-stage {
          padding-top: 34px;
          padding-bottom: 26px;
        }

        .boot-main {
          padding: 0 16px;
        }

        .boot-topbar-inner {
          padding-left: 16px;
          padding-right: 16px;
        }
      }

      @media (max-width: 640px) {
        .boot-topbar-inner {
          padding-top: 16px;
          padding-bottom: 16px;
        }

        .boot-hero {
          min-height: calc(100vh - 73px);
          padding: 22px 0 18px;
          gap: 22px;
        }

        .boot-auth-stage {
          min-height: calc(100vh - 73px);
          padding: 22px 0 18px;
        }

        .boot-auth-card {
          padding: 32px 24px;
        }

        .boot-mobile-hide {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell">
        <header class="boot-topbar">
          <div class="boot-topbar-inner">
            <div style="min-width: 0;">
              <div class="boot-shimmer" style="height: 14px; width: 118px; border-radius: 999px;"></div>
              <div class="boot-shimmer" style="height: 14px; width: 214px; margin-top: 10px; border-radius: 10px;"></div>
            </div>
            <div style="display: flex; align-items: center; gap: 12px; flex-shrink: 0;">
              <div class="boot-shimmer" style="height: 40px; width: 40px; border-radius: 999px;"></div>
              <div class="boot-shimmer" style="height: 40px; width: 104px; border-radius: 999px;"></div>
            </div>
          </div>
        </header>
        <main class="boot-main">
          <div class="boot-hero" data-boot-view="home">
            <section>
              <div class="boot-shimmer" style="height: 14px; width: 148px; border-radius: 999px;"></div>
              <div style="margin-top: 20px;">
                <div class="boot-shimmer" style="height: 56px; width: min(760px, 100%); border-radius: 28px;"></div>
                <div class="boot-shimmer" style="height: 56px; width: min(730px, 100%); margin-top: 14px; border-radius: 28px;"></div>
                <div class="boot-shimmer" style="height: 56px; width: min(710px, 100%); margin-top: 14px; border-radius: 28px;"></div>
                <div class="boot-shimmer" style="height: 56px; width: min(520px, 82%); margin-top: 14px; border-radius: 28px;"></div>
              </div>
              <div style="margin-top: 28px;">
                <div class="boot-shimmer" style="height: 24px; width: min(710px, 100%); border-radius: 14px;"></div>
                <div class="boot-shimmer" style="height: 24px; width: min(670px, 100%); margin-top: 14px; border-radius: 14px;"></div>
              </div>
              <div style="display: flex; gap: 16px; margin-top: 36px; flex-wrap: wrap;">
                <div class="boot-shimmer" style="height: 62px; width: 270px; border-radius: 22px;"></div>
                <div class="boot-shimmer" style="height: 62px; width: 160px; border-radius: 22px;"></div>
              </div>
            </section>

            <section class="boot-card" style="padding: 24px 24px 28px; border-radius: 36px;">
              <div class="boot-card" style="padding: 20px; border-radius: 28px; background: #171717;">
                <div style="display: flex; align-items: center; justify-content: space-between; gap: 14px;">
                  <div>
                    <div class="boot-shimmer" style="height: 22px; width: 150px; border-radius: 12px;"></div>
                    <div class="boot-shimmer" style="height: 14px; width: 190px; margin-top: 12px; border-radius: 10px;"></div>
                  </div>
                  <div class="boot-shimmer" style="height: 32px; width: 56px; border-radius: 999px;"></div>
                </div>

                <div style="margin-top: 28px; display: flex; flex-direction: column; gap: 14px;">
                  <div style="margin-left: auto; width: 78%; border-radius: 28px; background: rgba(20,184,166,0.16); padding: 18px 20px;">
                    <div class="boot-shimmer" style="height: 12px; width: 46px; border-radius: 999px; background-color: rgba(0,0,0,0.08);"></div>
                    <div class="boot-shimmer" style="height: 22px; width: 100%; margin-top: 14px; border-radius: 12px; background-color: rgba(0,0,0,0.08);"></div>
                    <div class="boot-shimmer" style="height: 22px; width: 78%; margin-top: 12px; border-radius: 12px; background-color: rgba(0,0,0,0.08);"></div>
                  </div>
                  <div class="boot-card" style="width: 86%; padding: 18px 20px; border-radius: 28px;">
                    <div class="boot-shimmer" style="height: 12px; width: 86px; border-radius: 999px;"></div>
                    <div class="boot-shimmer" style="height: 22px; width: 100%; margin-top: 14px; border-radius: 12px;"></div>
                    <div class="boot-shimmer" style="height: 22px; width: 84%; margin-top: 12px; border-radius: 12px;"></div>
                    <div class="boot-shimmer" style="height: 22px; width: 64%; margin-top: 12px; border-radius: 12px;"></div>
                  </div>
                  <div style="margin-left: auto; width: 72%; border-radius: 28px; background: rgba(20,184,166,0.16); padding: 18px 20px;">
                    <div class="boot-shimmer" style="height: 12px; width: 46px; border-radius: 999px; background-color: rgba(0,0,0,0.08);"></div>
                    <div class="boot-shimmer" style="height: 22px; width: 100%; margin-top: 14px; border-radius: 12px; background-color: rgba(0,0,0,0.08);"></div>
                    <div class="boot-shimmer" style="height: 22px; width: 82%; margin-top: 12px; border-radius: 12px; background-color: rgba(0,0,0,0.08);"></div>
                  </div>
                </div>
              </div>
            </section>
          </div>

          <section class="boot-auth-stage boot-hidden" data-boot-view="auth">
            <div class="boot-auth-inner">
              <div class="boot-auth-grid">
                <div class="boot-mobile-hide">
                  <div class="boot-shimmer" style="height: 14px; width: 132px; border-radius: 999px;"></div>
                  <div style="margin-top: 18px;">
                    <div class="boot-shimmer" style="height: 52px; width: min(640px, 100%); border-radius: 28px;"></div>
                    <div class="boot-shimmer" style="height: 52px; width: min(470px, 100%); margin-top: 12px; border-radius: 28px;"></div>
                  </div>
                  <div style="margin-top: 18px; max-width: 540px;">
                    <div class="boot-shimmer" style="height: 18px; width: 100%; border-radius: 12px;"></div>
                    <div class="boot-shimmer" style="height: 18px; width: 92%; margin-top: 12px; border-radius: 12px;"></div>
                    <div class="boot-shimmer" style="height: 18px; width: 76%; margin-top: 12px; border-radius: 12px;"></div>
                  </div>

                  <div class="boot-card" style="margin-top: 24px; border-radius: 28px; overflow: hidden; display: flex; flex-direction: column; min-height: 350px; background: rgba(255,255,255,0.03);">
                    <div style="display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px 20px;">
                      <div style="display: flex; gap: 8px;">
                        <div class="boot-shimmer" style="height: 10px; width: 10px; border-radius: 999px;"></div>
                        <div class="boot-shimmer" style="height: 10px; width: 10px; border-radius: 999px;"></div>
                        <div class="boot-shimmer" style="height: 10px; width: 10px; border-radius: 999px;"></div>
                      </div>
                      <div class="boot-shimmer" style="height: 12px; width: 144px; border-radius: 999px;"></div>
                      <div style="width: 40px;"></div>
                    </div>
                    <div style="flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px;">
                      <div style="margin-left: auto; width: 85%; border-radius: 20px; background: rgba(20,184,166,0.16); padding: 14px 16px;">
                        <div class="boot-shimmer" style="height: 12px; width: 40px; border-radius: 999px; background-color: rgba(0,0,0,0.08);"></div>
                        <div class="boot-shimmer" style="height: 18px; width: 100%; margin-top: 12px; border-radius: 12px; background-color: rgba(0,0,0,0.08);"></div>
                        <div class="boot-shimmer" style="height: 18px; width: 80%; margin-top: 10px; border-radius: 12px; background-color: rgba(0,0,0,0.08);"></div>
                      </div>
                      <div class="boot-card" style="width: 88%; border-radius: 20px; padding: 14px 16px; background: rgba(255,255,255,0.03);">
                        <div class="boot-shimmer" style="height: 12px; width: 90px; border-radius: 999px;"></div>
                        <div class="boot-shimmer" style="height: 18px; width: 100%; margin-top: 12px; border-radius: 12px;"></div>
                        <div class="boot-shimmer" style="height: 18px; width: 84%; margin-top: 10px; border-radius: 12px;"></div>
                        <div class="boot-shimmer" style="height: 18px; width: 68%; margin-top: 10px; border-radius: 12px;"></div>
                      </div>
                      <div style="margin-top: auto; display: flex; align-items: center; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px;">
                        <div class="boot-shimmer" style="height: 32px; flex: 1; border-radius: 999px;"></div>
                        <div class="boot-shimmer" style="height: 32px; width: 32px; border-radius: 999px;"></div>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="boot-card boot-auth-card">
                  <div class="boot-shimmer" style="height: 14px; width: 112px; border-radius: 999px;"></div>
                  <div class="boot-shimmer" style="height: 36px; width: 184px; margin-top: 18px; border-radius: 18px;"></div>
                  <div style="margin-top: 14px;">
                    <div class="boot-shimmer" style="height: 18px; width: 100%; border-radius: 12px;"></div>
                    <div class="boot-shimmer" style="height: 18px; width: 82%; margin-top: 10px; border-radius: 12px;"></div>
                  </div>

                  <div style="margin-top: 32px;">
                    <div class="boot-shimmer" style="height: 14px; width: 68px; border-radius: 10px;"></div>
                    <div class="boot-shimmer" style="height: 48px; width: 100%; margin-top: 10px; border-radius: 18px;"></div>
                  </div>
                  <div style="margin-top: 20px;">
                    <div class="boot-shimmer" style="height: 14px; width: 86px; border-radius: 10px;"></div>
                    <div class="boot-shimmer" style="height: 48px; width: 100%; margin-top: 10px; border-radius: 18px;"></div>
                  </div>
                  <div class="boot-shimmer" style="height: 56px; width: 100%; margin-top: 24px; border-radius: 18px;"></div>
                  <div style="display: flex; justify-content: center; margin-top: 24px;">
                    <div class="boot-shimmer" style="height: 16px; width: 180px; border-radius: 12px;"></div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var path = window.location.pathname;
        var showAuth = path === "/login" || path === "/register";
        var homeView = document.querySelector('[data-boot-view="home"]');
        var authView = document.querySelector('[data-boot-view="auth"]');
        if (homeView && authView) {
          homeView.classList.toggle("boot-hidden", showAuth);
          authView.classList.toggle("boot-hidden", !showAuth);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
